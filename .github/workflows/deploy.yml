# https://svelte.dev/docs/kit/adapter-static#GitHub-Pages

name: deploy to github pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: install dependencies
        run: npm install

      - name: build
        env:
          BASE_PATH: "" # as on user.github.io repo... no additional base needed
        run: npm run build

      - name: upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v5
